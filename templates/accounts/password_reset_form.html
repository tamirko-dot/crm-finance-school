<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איפוס סיסמה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Segoe UI","Arial Hebrew","David",Arial,sans-serif; font-size:15px; line-height:1.65; background:#f5f5f0; direction:rtl; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:#f5f5f0">
  <div class="w-full max-w-md">
    <div class="bg-white border border-gray-200 rounded p-10" style="box-shadow:0 0 24px rgba(0,0,0,0.05)">
      <h1 class="text-2xl font-bold mb-1" style="color:#1a2638">איפוס סיסמה</h1>
      <p class="text-sm mb-8" style="color:#6b7280">הזן את כתובת המייל שלך ונשלח לך קישור לאיפוס הסיסמה.</p>

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-6">
          <label class="block text-sm font-semibold mb-1" style="color:#2c3e50">כתובת דוא"ל</label>
          <input type="email" name="email" required autofocus
            class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2"
            style="border-color:#cbd5e0;direction:ltr;text-align:right">
        </div>
        <button type="submit"
          class="w-full py-2 rounded font-semibold text-white text-sm"
          style="background:#1a2638">
          שליחת קישור לאיפוס
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="{% url 'login' %}" class="text-sm" style="color:#6b7280">חזרה לכניסה</a>
      </div>
    </div>
  </div>
</body>
</html>
